version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       agos
      POSTGRES_USER:     agos
      POSTGRES_PASSWORD: agos_dev
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agos"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: [redisdata:/data]

  facilitator:
    build: { context: ../../, dockerfile: apps/facilitator/Dockerfile }
    ports: ["3001:3001"]
    env_file: [../../apps/facilitator/.env]
    environment:
      DATABASE_URL: postgresql://agos:agos_dev@postgres:5432/agos
      REDIS_URL:    redis://redis:6379
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started } }

  indexer:
    build: { context: ../../, dockerfile: apps/indexer/Dockerfile }
    env_file: [../../apps/indexer/.env]
    environment:
      DATABASE_URL: postgresql://agos:agos_dev@postgres:5432/agos
    depends_on: { postgres: { condition: service_healthy } }

volumes:
  pgdata:
  redisdata:
